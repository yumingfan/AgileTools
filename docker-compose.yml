# 映像標籤：預設 latest；若要鎖版可設 AGILETOOLS_VERSION=1.0.3
# 推送前請先：docker login（Docker Hub 或 GHCR，視 registry 而定）
services:
  server:
    image: yuminggood/agiletools-server:${AGILETOOLS_VERSION:-latest}
    restart: always
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      - PORT=9004
      # 不寫死 localhost：讓後端在未指定 WEB_ORIGIN 時採動態 Origin（見 apps/server/src/main.ts）
      # 若你要更嚴格，可改成：http://<你的主機IP或網域>:9003
      - WEB_ORIGIN=
      - PORT=9004
    ports:
      - "9004:9004"

  web:
    image: yuminggood/agiletools-web:${AGILETOOLS_VERSION:-latest}
    restart: always
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      # 不在 build-time 內嵌 localhost，避免其他電腦連線時 WS 連錯主機
      args: {}
    environment:
      - PORT=9003
    ports:
      - "9003:9003"
    depends_on:
      - server

